<style>
:root {
	color-scheme: light dark;
	--body: oklch(.95 0 0);
	--text: oklch(.3 0 0);
	--muted: oklch(.4 0 0);
	--card: oklch(1 0 0);
	--hue-female: 340;
	--hue-male: 240;
	--hue-other: 300;
	--hue-accent: 140;
	--hue-author: 60;
	--shadow: oklch(.5 0 0 / .1);
	--light: .7;
	--chroma: .18;
	--accent: oklch(var(--light) var(--chroma) var(--hue-accent));
}

@media (prefers-color-scheme: dark) {
	:root {
		--body: oklch(.2 0 0);
		--text: oklch(.9 0 0);
		--muted: oklch(.7 0 0);
		--card: oklch(.25 0 0);
		--shadow: oklch(0 0 0 / .4);
		--light: .9;
		--chroma: .11;
	}
}

* {
	box-sizing: border-box;
	scrollbar-width: thin;
	scrollbar-gutter: auto;
	corner-shape: squircle;
	text-wrap-style: pretty;
}

html {
	font-size: clamp(1rem, 1vw + .25rem, 1.5rem);
}

body {
	margin: 0;
	padding: 0;
	height: 100svh;
	overflow: hidden;
	font-family: system-ui, sans-serif;
	background: var(--body);
	color: var(--text);
	scrollbar-color: var(--accent) var(--body);
	&.male { --accent: oklch(var(--light) var(--chroma) var(--hue-male)); }
	&.female { --accent: oklch(var(--light) var(--chroma) var(--hue-female)); }
	&.other { --accent: oklch(var(--light) var(--chroma) var(--hue-other)); }
	&.author { --accent: oklch(var(--light) var(--chroma) var(--hue-author)); }
	transition: scrollbar-color .3s, color .3s;
}

a {
	color: var(--accent);
	text-decoration: none;
	transition: color .2s;
	&:hover {
		color: var(--accent);
		text-decoration: underline;
	}
}
b {
	font-weight: bold;
}
i {
	font-style: italic;
}
q {
	quotes: "\"" "\"" "“" "”" "‘" "’";
}

#background {
	position: fixed;
	inset: 0;
	z-index: -1;
	display: flex;
	align-items: center;
	justify-content: center;
	flex-direction: column;
	h1 {
		font-size: clamp(2rem, 5vw + 1rem, 4rem);
		font-weight: bold;
		text-align: center;
		margin: 0;
		padding: 0 1em;
		color: var(--muted);
		text-wrap-style: balance;
		max-width: 20ch;
	}
	div {
		font-size: clamp(1rem, 2vw + .5rem, 2rem);
		color: var(--muted);
		margin-top: 0.5em;
	}
}

#app {
	height: 100svh;
	overflow-y: scroll;
	scroll-snap-type: y mandatory;
	scroll-behavior: smooth;
}

.post {
	scroll-snap-align: start;
	height: 100svh;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 1em;
}
article {
	background: var(--card);
	border-radius: 1em;
	padding: 1em;
	min-width: 20ch;
	max-width: 90ch;
	max-height: 100svh;
	display: flex;
	flex-direction: column;
	box-shadow: 0 4px 20px var(--shadow);
	border-top: 4px solid var(--accent);
	header {
		display: flex;
		align-items: center;
		gap: 1em;
		margin-bottom: 1em;
		justify-content: space-between;
		align-items: flex-start;
		.avatar {
			width: 3em;
			height: 3em;
			border-radius: 50%;
			background: var(--accent, var(--text));
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
			color: var(--card);
			img, svg {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}
			svg {
				stroke: var(--card);
				stroke-width: 1.2;
				fill: none;
			}
		}
		.by {
			display: flex;
			flex-direction: column;
			gap: .25em;
			flex:auto;
			.name {
				font-weight: bold;
				font-size: 1.2em;
				flex: 1;
				a {
					color: var(--accent);
					text-decoration: none;
					&:hover {
						text-decoration: underline;
						color: var(--text);
					}
				}
			}
			.date {
				font-size: 0.9em;
				color: var(--muted);
			}
		}
		.source {
			display: flex;
			align-items: center;
			gap: .5em;
			a {
				color: var(--muted);
				display: flex;
				align-items: center;
				justify-content: center;
				transition: color .2s;
				padding: .5em;
				margin: -.5em;
				&:hover {
					color: var(--accent);
				}
				svg {
					width: 1.5em;
					height: 1.5em;
					stroke: currentColor;
					stroke-width: 2;
					stroke-linecap: round;
					stroke-linejoin: round;
					fill: none;
				}
			}
		}
	}

	.content {
		line-height: 1.5;
		overflow-y: auto;
		overscroll-behavior: contain;
		scrollbar-color: var(--accent) var(--card);
		p {
			margin: 0 0 1em 0;
			&:last-child {
				margin-bottom: 0;
			}
		}
	}
	.gallery {
		display: grid;
		grid-auto-flow: column dense;
		grid-auto-columns: minmax(20px, clamp(20px, 25vw, 200px));
		gap: .5em;
		margin-top: 1em;
		button {
			padding: 0;
			margin: 0;
			border: none;
			background: transparent;
			border-radius: .5em;
			cursor: pointer;
			transition: opacity .2s, filter .3s;
			&:hover:not(:disabled) {
				opacity: .8;
			}
			&:disabled {
				cursor: not-allowed;
				user-select: none;
			}
			&.nsfw {
				filter: blur(10px) contrast(0.2);
				pointer-events: none;
			}
			img {
				width: 100%;
				height: auto;
				border-radius: .5em;
				object-fit: cover;
				aspect-ratio: 1;
				display: block;
				user-select: none;
				pointer-events: none;
			}
		}
	}
}


body.nsfw .nsfw {
	filter: none !important;
	pointer-events: auto !important;
}

dialog {
	max-width: 100dvw;
	max-height: 100dvh;
	&::backdrop {
		background: oklch(0 0 0 / .8);
	}
}

button {
	&:focus,
	&:focus-visible {
		outline: 2px solid var(--accent, var(--text));
		outline-offset: 2px;
	}
}

#nsfw-warning {
	border: 1px solid var(--muted);
	background: var(--card);
	border-radius: 1em;
	padding: 2em;
	color: var(--text);
	max-width: 400px;
	box-shadow: 0 10px 30px var(--shadow);
	text-align: center;
	h2 {
		margin-top: 0;
	}
	p {
		margin-bottom: 2em;
	}
	form {
		display: flex;
		gap: 1em;
		justify-content: center;
		flex-wrap: wrap;
	}
	button {
		background: var(--text);
		color: var(--card);
		border: none;
		border-radius: 0.5em;
		padding: 0.75em 1.5em;
		font-size: 1.1rem;
		font-weight: bold;
		cursor: pointer;
		transition: opacity 0.2s;
		&:hover {
			opacity: 0.8;
		}
		&#reject-nsfw {
			background: var(--muted);
		}
	}
}

#lightbox {
	z-index: 10;
	width: 100%;
	height: 100%;
	margin: 0;
	background: transparent;
	border: none;
	padding: 0;
	overflow: hidden;
	&[open] {
		display: flex;
		align-items: center;
		justify-content: center;
	}
	img {
		max-width: 90dvw;
		max-height: 90dvh;
		object-fit: contain;
		user-select: none;
	}
	button {
		position: absolute;
		background: oklch(0 0 0 / .5);
		color: #fff;
		border: none;
		border-radius: 50%;
		width: 3em;
		height: 3em;
		font-size: 1.5rem;
		display: flex;
		align-items: center;
		justify-content: center;
		cursor: pointer;
		transition: background-color .2s;
		&:hover {
			background: oklch(0 0 0 / .8);
		}
		&#close {
			top: 1em;
			right: 1em;
		}
		&#prev {
			left: 1em;
			top: 50%;
			translate: 0 -50%;
		}
		&#next {
			right: 1em;
			top: 50%;
			translate: 0 -50%;
		}
	}
}

@media (width > 700px) {
	.post {
		.card {
			padding: 2em;
		}
	}
}
</style>
</head>
<body>
<div id="background">
	<h1>Testimonies Against<br>Circumcision</h1>
	<div>
		<a href="https://x.com/hashtag/MenDoComplain" target="_blank">#MenDoComplain</a>
		<a href="https://x.com/hashtag/IfIWereABoy" target="_blank">#IfIWereABoy</a>
		<a href="https://x.com/hashtag/IAmNotThankful" target="_blank">#IAmNotThankful</a>
	</div>
</div>
<main id="app"></main>

<template id="post-template">
	<div class="post">
		<article>
			<header>
				<div class="avatar"></div>
				<div class="by">
					<div class="name"></div>
					<time class="date" datetime="">[date missing]</time>
				</div>
				<div class="source">
					<a href="" target="_blank" rel="noopener" aria-label="Original source" title="Original source">
						<svg><use href="#icon-link"></use></svg>
					</a>
				</div>
			</header>
			<div class="content"></div>
			<div class="gallery"></div>
		</article>
	</div>
</template>

<template id="image-template">
	<button class="">
		<img src="" alt="">
	</button>
</template>

<dialog id="lightbox" closedby="any">
	<form method="dialog">
		<button id="close" aria-label="Close lightbox" autofocus>&times;</button>
	</form>
	<button id="prev" aria-label="Previous image">&lsaquo;</button>
	<img id="image" src="" alt="Gallery Image">
	<button id="next" aria-label="Next image">&rsaquo;</button>
</dialog>

<dialog id="nsfw-warning">
	<h2>Content Warning</h2>
	<p>Some images in this gallery contain sensitive or graphic content related to medical procedures or injuries. Do you want to reveal them?</p>
	<form method="dialog">
		<button id="reject-nsfw" autofocus>No</button>
		<button id="accept-nsfw">Yes</button>
	</form>
</dialog>

<svg style="display: none;">
	<symbol id="icon-female" viewBox="0 0 24 24">
		<circle cx="12" cy="10" r="5"/>
		<path d="M12 15v7M9 19h6"/>
	</symbol>
	<symbol id="icon-male" viewBox="0 0 24 24">
		<circle cx="10" cy="14" r="5"/>
		<path d="M14 10L20 4M16 4h4v4"/>
	</symbol>
	<symbol id="icon-other" viewBox="0 0 24 24">
		<circle cx="12" cy="10" r="5"/>
		<path d="M12 15v7M9 19h6M15.5 6.5L20 2M16 2h4v4M8.5 6.5L4 2M8 2H4v4"/>
	</symbol>
	<symbol id="icon-link" viewBox="0 0 24 24">
		<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
	</symbol>
</svg>

<script>
"use strict";

let NSFW = {
	show: false,
	answered: false,
	timeout: null
}

document.addEventListener('DOMContentLoaded', () => {
	const
		app = document.getElementById('app'),
		postTemplate = document.getElementById('post-template'),
		imageTemplate = document.getElementById('image-template'),
		markup = (str) => {
			// Regex breakdown:
			// 1. ***bold italic***
			// 2. **bold**
			// 3. *italic*
			// 4. "quote"
			// 5 & 6. [text](https://...)
			// 7. (https://...)
			const
				root = document.createElement("p"),
				regex = /\*\*\*(.*?)\*\*\*|\*\*(.*?)\*\*|\*(.*?)\*|"(.*?)"|\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)|\((https?:\/\/[^)\s]+)\)/g;
			if (!str) return root;
			let lastIndex = 0;
			for (const match of str.matchAll(regex)) {
				if (match.index > lastIndex) {
					root.append(str.slice(lastIndex, match.index));
				}
				const [
					fullMatch,
					boldItalic,
					bold,
					italic,
					quote,
					linkText,
					linkUrl,
					autoLinkUrl,
				] = match;
				if (boldItalic) {
					const b = document.createElement("b");
					const i = document.createElement("i");
					i.textContent = boldItalic;
					b.append(i);
					root.append(b);
				} else if (bold) {
					const b = document.createElement("b");
					b.textContent = bold;
					root.append(b);
				} else if (italic) {
					const i = document.createElement("i");
					i.textContent = italic;
					root.append(i);
				} else if (quote) {
					const q = document.createElement("q");
					q.textContent = quote;
					root.append(q);
				} else if (linkText && linkUrl) {
					const a = document.createElement("a");
					a.textContent = linkText;
					a.href = linkUrl;
					root.append(a);
				} else if (autoLinkUrl) {
					const a = document.createElement("a");
					a.textContent = autoLinkUrl;
					a.href = autoLinkUrl;
					root.append(a);
				}
				lastIndex = match.index + fullMatch.length;
			}
			if (lastIndex < str.length) {
				root.append(str.slice(lastIndex));
			}
			return root;
		};
	fetch(
			`data.json?v=${Date.now()}`,
			{
				cache: 'no-store',
			}
		)
		.then(response => response.json())
		.then(data => {
			let anon = 0;
			data.sort(() => Math.random() - 0.5);
			const fragment = document.createDocumentFragment();

			data.forEach(item => {
				const
					postClone = postTemplate.content.cloneNode(true),
					post = postClone.querySelector('.post'),
					article = post.querySelector('article'),
					avatar = article.querySelector('.avatar'),
					name = article.querySelector('.name'),
					date = article.querySelector('.date'),
					source = article.querySelector('.source'),
					soureLink = source.querySelector('a'),
					content = article.querySelector('.content'),
					gallery = article.querySelector('.gallery');

				post.id = item.id || ++anon;
				article.classList.add(item.gender || 'shared');

				if (item.picture) {
					const img = document.createElement('img');
					img.src = item.picture;
					img.loading = "lazy";
					avatar.append(img);
				} else {
					const
						gender = item.gender || 'other',
						svg = document.createElementNS("http://www.w3.org/2000/svg", "svg"),
						use = document.createElementNS("http://www.w3.org/2000/svg", "use");
					use.setAttribute("href", `#icon-${gender}`);
					svg.appendChild(use);
					avatar.append(svg);
					article.classList.add(gender);
				}

				if (item.profile) {
					const a = document.createElement('a');
					a.href = item.profile;
					a.target = '_blank';
					a.textContent = item.name || 'Anonymous';
					name.append(a);
				} else {
					name.textContent = item.name || 'Anonymous';
				}
				if (item.date) {
					const dateObj = new Date(item.date);
					if (!isNaN(dateObj)) {
						date.textContent = dateObj.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
						date.setAttribute('datetime', dateObj.toISOString());
					}
				}
				if (item.source) {
					soureLink.href = item.source;
				} else {
					source.remove();
				}

				if (Array.isArray(item.content)) {
					item.content.forEach(text => {
						content.append(markup(text));
					});
				} else {
					content.append(markup(item.content));
				}

				if (item.gallery && item.gallery.length > 0) {
					item.gallery.slice(0, 4).forEach(itemObj => {
						const
							url = typeof itemObj === 'string' ? itemObj : itemObj.url,
							nsfw = typeof itemObj === 'string' ? false : !!itemObj.nsfw,
							imgClone = imageTemplate.content.cloneNode(true),
							btn = imgClone.querySelector('button'),
							img = imgClone.querySelector('img');
						img.src = url;
						img.loading = 'lazy';
						if (nsfw) {
							btn.classList.add('nsfw');
							post.classList.add('has-nsfw');
							if (!NSFW.show) {
								btn.disabled = true;
							}
						}
						gallery.append(imgClone);
					});
				}
				else {
					gallery.remove();
				}

				fragment.append(postClone);
			});

		app.append(fragment);

		const
			dialogNSFW = document.getElementById('nsfw-warning'),
			acceptNSFW = document.getElementById('accept-nsfw'),
			rejectNSFW = document.getElementById('reject-nsfw');

		acceptNSFW.addEventListener('click', () => {
			NSFW.answered = true;
			NSFW.show = true;
			document.body.classList.add('nsfw');
			document.querySelectorAll('.gallery button.nsfw').forEach(btn => btn.disabled = false);
		});

		rejectNSFW.addEventListener('click', () => {
			NSFW.answered = true;
		});

		const observer = new IntersectionObserver((entries) => {
			for (const entry of entries) {
				if (entry.isIntersecting) {
					document.body.classList.remove('male', 'female', 'other', 'author');
					document.body.classList.add(... entry.target.querySelector('article').classList);
					history.replaceState(null, null, '#' + entry.target.id);
					clearTimeout(NSFW.timeout);
					if (!NSFW.answered && !!entry.target.querySelector('.nsfw') && !dialogNSFW.open) {
						NSFW.timeout = setTimeout(() => {
							if (!dialogNSFW.open) {
								dialogNSFW.showModal();
							}
						}, 600);
					}
				}
			}
		}, {
			root: app,
			threshold: .5
		});

		document.querySelectorAll('.post').forEach(post => {
			observer.observe(post);
		});

		if (window.location.hash) {
			const target = document.getElementById(window.location.hash.substring(1));
			if (target) {
				target.scrollIntoView();
			}
		}

	})
	.catch(err => {
		console.error('Error loading data:', err);
	});

	const
		lightbox = document.getElementById('lightbox'),
		image = document.getElementById('image'),
		prev = document.getElementById('prev'),
		next = document.getElementById('next'),
		close = document.getElementById('close');

	let images = [],
		index = 0;

	function updateLightbox() {
		image.src = images[index].src;
		const showNav = images.length > 1;
		prev.style.display = showNav ? 'flex' : 'none';
		next.style.display = showNav ? 'flex' : 'none';
	}

	function openLightbox(imgs, idx) {
		images = imgs;
		index = idx;
		updateLightbox();
		lightbox.showModal();
	}

	function closeLightbox() {
		lightbox.close();
	}

	function navLightbox(dir) {
		if (images.length <= 1) return;
		index = (index + dir + images.length) % images.length;
		updateLightbox();
	}

	app.addEventListener('click', (e) => {
		const btn = e.target.closest('button');
		if (btn && btn.closest('.gallery')) {
			const gallery = btn.closest('.gallery');
			const btns = Array.from(gallery.querySelectorAll('button:not(:disabled)'));
			const idx = btns.indexOf(btn);
			if (idx > -1) {
				const imgs = btns.map(b => b.querySelector('img'));
				openLightbox(imgs, idx);
			}
		}
	});

	close.addEventListener('click', closeLightbox);
	prev.addEventListener('click', () => navLightbox(-1));
	next.addEventListener('click', () => navLightbox(1));

	lightbox.addEventListener('click', (e) => {
		if (e.target === lightbox) closeLightbox();
	});

	document.addEventListener('keydown', (e) => {
		if (!lightbox.open) return;
		if (e.key === 'ArrowLeft') navLightbox(-1);
		if (e.key === 'ArrowRight') navLightbox(1);
	});
});
</script>
</body>
</html>
