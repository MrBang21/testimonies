<style>
:root {
	color-scheme: light dark;
	--body: oklch(0.95 0 0);
	--text: oklch(0.3 0 0);
	--muted: oklch(0.4 0 0);
	--card: oklch(1 0 0);
	--hue-female: 340;
	--hue-male: 240;
	--hue-other: 300;
	--hue-author: 60;
	--shadow: oklch(0.5 0 0 / 0.1);

	--light: 0.7;
	--chroma: 0.18;

	--light-hover: 0.6;
	--chroma-hover: 0.18;

	--light-active: 0.5;
	--chroma-active: 0.18;

	--quick-width: 20ch;
}

@media (prefers-color-scheme: dark) {
	:root {
		--body: oklch(0.2 0 0);
		--text: oklch(0.9 0 0);
		--muted: oklch(0.7 0 0);
		--card: oklch(0.25 0 0);
		--shadow: oklch(0 0 0 / 0.4);
		--light: 0.9;
		--chroma: 0.11;
		--light-hover: 1;
		--chroma-hover: 0.08;
		--light-active: 1;
		--chroma-active: 0.04;
	}
}

* {
	box-sizing: border-box;
	scrollbar-width: thin;
	scrollbar-gutter: auto;
	corner-shape: squircle;
	text-wrap-style: pretty;
	&.male { --hue: var(--hue-male); }
	&.female { --hue: var(--hue-female); }
	&.other { --hue: var(--hue-other); }
	&.author { --hue: var(--hue-author); }
}

html {
	font-size: clamp(1rem, 1vw + .25rem, 1.25rem);
}

body {
	margin: 0;
	padding: 0;
	--height: 100svh;
	overflow: hidden;
	font-family: system-ui, sans-serif;
	background: var(--body);
	color: var(--text);
	--_accent: oklch(var(--light) var(--chroma) var(--hue));
	scrollbar-color: var(--_accent) var(--body);
	transition: scrollbar-color 0.3s, color 0.3s;
}

a {
	color: var(--_accent);
	text-decoration: none;
	transition: color 0.2s;
	&:hover {
		color: oklch(var(--light-hover) var(--chroma-hover) var(--hue));
		text-decoration: underline;
	}
	&:active {
		color: oklch(var(--light-active) var(--chroma-active) var(--hue));
	}
}
b {
	font-weight: bold;
}
i {
	font-style: italic;
}
q {
	quotes: "\"" "\"" "“" "”" "‘" "’";
}

#background {
	position: fixed;
	inset: 0;
	z-index: -1;
	display: flex;
	align-items: center;
	justify-content: space-between;
	flex-direction: column;
	&:after {
		content: "";
		position: absolute;
		inset: 0;
		background-color: oklch(from var(--body) l c h / 0.5);
	}
	h1, div {
		color: var(--muted);
		text-align: center;
		padding: 1em;
		margin: 0;
		text-wrap-style: balance;
	}
	h1 {
		font-size: clamp(2em, 5vw + 1rem, 4em);
		font-weight: bold;
	}
	div {
		font-size: clamp(.75em, 2vw + .5rem, 1em);
	}
}

#app {
	overflow-y: scroll;
	scroll-snap-type: y mandatory;
	scroll-behavior: smooth;
	position: fixed;
	inset: 0;
	gap: 1em;
}
#quick {
	position: fixed;
	top: 50%;
	left: 0;
	transform: translateY(-50%);
	display: flex;
	display: none;
	flex-direction: column;
	background: var(--card);
	border-radius: 0 1em 1em 0;
	border: 0.0625em solid var(--_accent);
	border-left: none;
	width: var(--quick-width);
	gap: 0.5em;
	height: 30svh;
	padding: 4em 1em;
	overflow: hidden;
	mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
	-webkit-mask-image: linear-gradient(to bottom, transparent, #000 30%, #000 70%, transparent);
	a {
		opacity: 0.3;
		transform-origin: left center;
		transition:
			opacity 0.3s,
			scale 0.3s,
			color 0.3s;
		font-size: 1em;
		scale: 0.75;
		white-space: nowrap;
		color: oklch(var(--light) var(--chroma) var(--hue));
		&:hover {
			opacity: 0.8;
			scale: 1;
		}
		&.active {
			scale: 1;
			opacity: 1;
			font-weight: bold;
		}
	}
}

.post {
	scroll-snap-align: start;
	height: 100svh;
	display: flex;
	align-items: center;
	justify-content: center;
	padding: 0 0.5em;
}
article {
	background: var(--card);
	border-radius: 1em;
	padding: 1em;
	min-width: 20ch;
	max-width: 90ch;
	max-height: 90svh;
	display: flex;
	flex-direction: column;
	box-shadow: 0 0.25em 1em var(--shadow);
	border-top: 0.25em solid var(--_accent);
	header {
		display: flex;
		align-items: center;
		gap: 1em;
		margin-bottom: 1em;
		justify-content: space-between;
		align-items: flex-start;
		.avatar {
			width: 3em;
			height: 3em;
			border-radius: 50%;
			background: var(--_accent, var(--text));
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
			color: var(--card);
			img, svg {
				width: 100%;
				height: 100%;
				object-fit: cover;
				display: block;
			}
			svg {
				stroke: var(--card);
				stroke-width: 1.2;
				fill: none;
			}
		}
		.by {
			display: flex;
			gap: .25em;
			flex: 1;
			flex-wrap: wrap;
			.name {
				font-weight: bold;
				font-size: 1.2em;
				flex: 1 1 100%;
			}
			.details {
				display: flex;
				flex-wrap: wrap;
				> * {
					margin-right: 1em;
					font-size: 0.9em;
					color: var(--muted);
				}
			}
		}
		.source {
			display: flex;
			align-items: center;
			gap: 0.5em;
			a {
				display: flex;
				align-items: center;
				justify-content: center;
				transition: color 0.2s;
				padding: 0.5em;
				margin: -0.5em;
				svg {
					width: 1.5em;
					height: 1.5em;
					stroke: currentColor;
					stroke-width: 2;
					stroke-linecap: round;
					stroke-linejoin: round;
					fill: none;
				}
			}
		}
	}
	.content {
		line-height: 1.5;
		overflow-y: auto;
		scrollbar-color: var(--_accent) var(--card);
		p {
			margin: 0 0 1em 0;
			&:last-child {
				margin-bottom: 0;
			}
		}
	}
	.gallery {
		display: grid;
		grid-auto-flow: column dense;
		grid-auto-columns: minmax(3em, clamp(3em, 25vw, 10em));
		gap: 0.5em;
		margin-top: 1em;
		button {
			padding: 0;
			margin: 0;
			border: none;
			background: transparent;
			border-radius: 0.5em;
			cursor: pointer;
			transition: opacity 0.2s, filter 0.3s;
			&:hover:not(:disabled) {
				opacity: 0.8;
			}
			&:disabled {
				cursor: not-allowed;
				user-select: none;
			}
			&.nsfw {
				filter: blur(0.5em) contrast(0.2);
				pointer-events: none;
			}
			img {
				width: 100%;
				height: auto;
				border-radius: 0.5em;
				object-fit: cover;
				aspect-ratio: 1;
				display: block;
				user-select: none;
				pointer-events: none;
			}
		}
	}
}


body.nsfw .nsfw {
	filter: none !important;
	pointer-events: auto !important;
}

dialog {
	max-width: 100dvw;
	max-height: 100dvh;
	&::backdrop {
		background: oklch(0 0 0 / 0.8);
	}
}

button {
	border: none;
	border-radius: 0.5em;
	user-select: none;
	cursor: pointer;
	font-weight: bold;
	&:focus,
	&:focus-visible {
		outline: 0.0625em solid var(--_accent, var(--text));
		outline-offset: 0.0625em;
	}
}

#nsfw-warning {
	border: 0.0625em solid var(--_accent);
	background-color: var(--card);
	border-radius: 1em;
	padding: 2em;
	color: var(--text);
	max-width: 40ch;
	box-shadow: 0 0.5em 1em var(--shadow);
	text-align: center;
	h2 {
		margin-top: 0;
	}
	p {
		margin-bottom: 2em;
	}
	form {
		display: flex;
		gap: 1em;
		justify-content: center;
		flex-wrap: wrap;
	}
	button {
		background-color: var(--_accent);
		color: var(--card);
		padding: 0.75em 1.5em;
		font-size: 1.1rem;
		transition: opacity 0.2s;
		&:hover {
			opacity: 0.8;
		}
		&#reject-nsfw {
			background-color: var(--muted);
		}
	}
}

#lightbox {
	z-index: 10;
	width: 100%;
	height: 100%;
	margin: 0;
	background: transparent;
	border: none;
	padding: 0;
	overflow: hidden;
	&[open] {
		display: flex;
		align-items: center;
		justify-content: center;
	}
	img {
		max-width: 90dvw;
		max-height: 90dvh;
		object-fit: contain;
		user-select: none;
	}
	button {
		position: absolute;
		background-color: oklch(0 0 0 / 0.25);
		color: var(--_accent);
		border: none;
		border-radius: 50%;
		width: 2em;
		height: 2em;
		font-size: 2em;
		display: flex;
		align-items: center;
		justify-content: center;
		transition: background-color 0.2s;
		&:hover {
			background-color: oklch(0 0 0 / 0.8);
		}
		&#close {
			top: 1em;
			right: 1em;
		}
		&#prev {
			left: 1em;
			top: 50%;
			translate: 0 -50%;
		}
		&#next {
			right: 1em;
			top: 50%;
			translate: 0 -50%;
		}
	}
}

@media (width > 45em) {
	.post {
		padding: 0 1em;
		.card {
			padding: 2em;
		}
	}
}

@media (width > 60em) {
	#background,
	#app {
		left: var(--quick-width);
	}
	#quick {
		display: flex;
	}
}
</style>

<svg style="display: none;">

	</symbol>
	<symbol id="icon-link" viewBox="0 0 24 24">
		<path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6M15 3h6v6M10 14L21 3"/>
	</symbol>
</svg>

<script>
"use strict";

let NSFW = {
	show: false,
	answered: false,
	timeout: null
}

document.addEventListener('DOMContentLoaded', () => {
	const
		app = document.getElementById('app'),
		postTemplate = document.getElementById('post-template'),
		imageTemplate = document.getElementById('image-template'),
		markup = (str) => {
			// Regex breakdown:
			// ***bold italic***
			// **bold**
			// *italic*
			// "quote"
			// \n (line break)
			// [text](https://...)
			// (https://...)
			const
				root = document.createElement("p"),
				regex = /\*\*\*(.*?)\*\*\*|\*\*(.*?)\*\*|\*(.*?)\*|"(.*?)"|(\n)|\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)|\((https?:\/\/[^)\s]+)\)/g;
			if (!str) return root;
			let lastIndex = 0;
			for (const match of str.matchAll(regex)) {
				if (match.index > lastIndex) {
					root.append(str.slice(lastIndex, match.index));
				}
				const [
					fullMatch,
					boldItalic,
					bold,
					italic,
					quote,
					lineBreak,
					linkText,
					linkUrl,
					autoLinkUrl,
				] = match;
				if (boldItalic) {
					const b = document.createElement("b");
					const i = document.createElement("i");
					i.textContent = boldItalic;
					b.append(i);
					root.append(b);
				} else if (bold) {
					const b = document.createElement("b");
					b.textContent = bold;
					root.append(b);
				} else if (italic) {
					const i = document.createElement("i");
					i.textContent = italic;
					root.append(i);
				} else if (quote) {
					const q = document.createElement("q");
					q.textContent = quote;
					root.append(q);
				} else if (lineBreak) {
					root.append(document.createElement("br"));
				} else if (linkText && linkUrl) {
					const a = document.createElement("a");
					a.textContent = linkText;
					a.href = linkUrl;
					a.target = "_blank";
					a.rel = "noopener noreferrer";
					root.append(a);
				} else if (autoLinkUrl) {
					const a = document.createElement("a");
					a.textContent = autoLinkUrl;
					a.href = autoLinkUrl;
					a.target = "_blank";
					a.rel = "noopener noreferrer";
					root.append(a);
				}
				lastIndex = match.index + fullMatch.length;
			}
			if (lastIndex < str.length) {
				root.append(str.slice(lastIndex));
			}
			return root;
		};
	// Load data and populate posts
	fetch(
			`data.json?v=${Date.now()}`,
			{
				cache: 'no-store',
			}
		)
		.then(response => response.json())
		.then(data => {
			let anon = 0;
			data.sort(() => Math.random() - 0.5);
			const fragment = document.createDocumentFragment();

			data.forEach(item => {
				const
					postClone = postTemplate.content.cloneNode(true),
					post = postClone.querySelector('.post'),
					article = post.querySelector('article'),
					avatar = article.querySelector('.avatar'),
					name = article.querySelector('.name'),
					date = article.querySelector('.date'),
					location = article.querySelector('.location'),
					source = article.querySelector('.source'),
					soureLink = source.querySelector('a'),
					content = article.querySelector('.content'),
					gallery = article.querySelector('.gallery'),
					quick = document.getElementById('quick'),
					quickItem = document.getElementById('quick-item-template').content.cloneNode(true),
					quickLink = quickItem.querySelector('a'),
					quickName = quickItem.querySelector('.name');

				post.id = item.id || ++anon;
				article.classList.add(item.gender || 'shared');

				if (item.picture) {
					const img = document.createElement('img');
					img.src = item.picture;
					img.loading = "lazy";
					avatar.append(img);
				} else {
					const
						gender = item.gender || 'other',
						svg = document.createElementNS("http://www.w3.org/2000/svg", "svg"),
						use = document.createElementNS("http://www.w3.org/2000/svg", "use");
					use.setAttribute("href", `#icon-${gender}`);
					svg.appendChild(use);
					avatar.append(svg);
					article.classList.add(gender);
				}

				if (item.profile) {
					const a = document.createElement('a');
					a.href = item.profile;
					a.target = '_blank';
					a.textContent = item.name || 'Anonymous';
					name.append(a);
				} else {
					name.textContent = item.name || 'Anonymous';
				}
				
				quickName.textContent = item.name || 'Anonymous';
				quickLink.href = `#${post.id}`;
				quickLink.classList.add(item.gender || 'shared');
				quick.append(quickLink);

				if (item.date) {
					const dateObj = new Date(item.date);
					if (!isNaN(dateObj)) {
						date.textContent = dateObj.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
						date.setAttribute('datetime', dateObj.toISOString());
					}
				}
				else {
					date.remove();
				}
				if (item.location) {
					location.textContent = item.location;
				}
				else {
					location.remove();
				}
				if (item.source) {
					soureLink.href = item.source;
				} else {
					source.remove();
				}
				if (Array.isArray(item.content)) {
					item.content.forEach(text => {
						content.append(markup(text));
					});
				} else {
					content.append(markup(item.content));
				}
				if (item.gallery && item.gallery.length > 0) {
					item.gallery.slice(0, 4).forEach(itemObj => {
						const
							url = typeof itemObj === 'string' ? itemObj : itemObj.url,
							nsfw = typeof itemObj === 'string' ? false : !!itemObj.nsfw,
							imgClone = imageTemplate.content.cloneNode(true),
							btn = imgClone.querySelector('button'),
							img = imgClone.querySelector('img');
						img.src = url;
						img.loading = 'lazy';
						if (nsfw) {
							btn.classList.add('nsfw');
							post.classList.add('has-nsfw');
							if (!NSFW.show) {
								btn.disabled = true;
							}
						}
						gallery.append(imgClone);
					});
				}
				else {
					gallery.remove();
				}
				fragment.append(postClone);
			});
		app.append(fragment);

		// Intersection Observer for updating body class and URL hash
		const observer = new IntersectionObserver((entries) => {
			for (const entry of entries) {
				if (entry.isIntersecting) {
					document.body.classList.remove('male', 'female', 'other', 'author');
					document.body.classList.add(... entry.target.querySelector('article').classList);
					history.replaceState(null, null, '#' + entry.target.id);
					const
						quick = document.getElementById('quick'),
						quickLinks = quick.querySelectorAll('a'),
						activeLink = quick.querySelector(`a[href="#${entry.target.id}"]`);
					quickLinks.forEach(link => link.classList.remove('active'));
					if (activeLink) {
						activeLink.classList.add('active');
						quick.scrollTo({
							top: activeLink.offsetTop - quick.offsetHeight / 2 + activeLink.offsetHeight / 2,
							behavior: 'smooth'
						});
					}
					clearTimeout(NSFW.timeout);
					if (!NSFW.answered && !!entry.target.querySelector('.nsfw') && !dialogNSFW.open) {
						NSFW.timeout = setTimeout(() => {
							if (!dialogNSFW.open) {
								dialogNSFW.showModal();
							}
						}, 600);
					}
				}
			}
		}, {
			root: app,
			threshold: .5
		});

		document.querySelectorAll('.post').forEach(post => {
			observer.observe(post);
		});

		if (window.location.hash) {
			const target = document.getElementById(window.location.hash.substring(1));
			if (target) {
				target.scrollIntoView();
			}
		}

		const quick = document.getElementById('quick');
		quick.addEventListener('wheel', (e) => {
			e.preventDefault();
			const dir = Math.sign(e.deltaY);
			app.scrollBy({ top: dir * window.innerHeight * 0.5, behavior: 'smooth' });
		}, {passive: false});

		let quickTouchY = 0;
		quick.addEventListener('touchstart', (e) => {
			quickTouchY = e.touches[0].clientY;
		}, {passive: true});
		quick.addEventListener('touchmove', (e) => {
			e.preventDefault();
		}, {passive: false});
		quick.addEventListener('touchend', (e) => {
			const touchEndY = e.changedTouches[0].clientY;
			const diff = quickTouchY - touchEndY;
			if (Math.abs(diff) > 20) {
				const dir = Math.sign(diff);
				app.scrollBy({ top: dir * window.innerHeight * 0.5, behavior: 'smooth' });
			}
		});

	})
	.catch(err => {
		console.error('Error loading data:', err);
	});

	// NSFW warning
	const
		dialogNSFW = document.getElementById('nsfw-warning'),
		acceptNSFW = document.getElementById('accept-nsfw'),
		rejectNSFW = document.getElementById('reject-nsfw');

	acceptNSFW.addEventListener('click', () => {
		NSFW.answered = true;
		NSFW.show = true;
		document.body.classList.add('nsfw');
		document.querySelectorAll('.gallery button.nsfw').forEach(btn => btn.disabled = false);
	});

	rejectNSFW.addEventListener('click', () => {
		NSFW.answered = true;
	});

	// Lightbox
	const
		lightbox = document.getElementById('lightbox'),
		image = document.getElementById('image'),
		prev = document.getElementById('prev'),
		next = document.getElementById('next'),
		close = document.getElementById('close');

	let images = [],
		index = 0;

	function updateLightbox() {
		image.src = images[index].src;
		const showNav = images.length > 1;
		prev.style.display = showNav ? 'flex' : 'none';
		next.style.display = showNav ? 'flex' : 'none';
	}

	function openLightbox(imgs, idx) {
		images = imgs;
		index = idx;
		updateLightbox();
		lightbox.showModal();
	}

	function closeLightbox() {
		lightbox.close();
	}

	function navLightbox(dir) {
		if (images.length <= 1) return;
		index = (index + dir + images.length) % images.length;
		updateLightbox();
	}

	app.addEventListener('click', (e) => {
		const btn = e.target.closest('button');
		if (btn && btn.closest('.gallery')) {
			const gallery = btn.closest('.gallery');
			const btns = Array.from(gallery.querySelectorAll('button:not(:disabled)'));
			const idx = btns.indexOf(btn);
			if (idx > -1) {
				const imgs = btns.map(b => b.querySelector('img'));
				openLightbox(imgs, idx);
			}
		}
	});

	close.addEventListener('click', closeLightbox);
	prev.addEventListener('click', () => navLightbox(-1));
	next.addEventListener('click', () => navLightbox(1));

	lightbox.addEventListener('click', (e) => {
		if (e.target === lightbox) closeLightbox();
	});

	document.addEventListener('keydown', (e) => {
		if (!lightbox.open) return;
		if (e.key === 'ArrowLeft') navLightbox(-1);
		if (e.key === 'ArrowRight') navLightbox(1);
	});
});
</script>
</body>
</html>
